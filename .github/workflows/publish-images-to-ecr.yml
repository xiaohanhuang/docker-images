name: Publish Docker Images to ECR

on:
  push:
    branches: ["main"]
    paths:
      - "projects/**"
      - ".github/workflows/publish-images-to-ecr.yml"
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild all images"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish-images-to-ecr
  cancel-in-progress: true

env:
  AWS_REGION: us-west-2
  # Update these to your AWS account / ECR registry.
  AWS_ROLE_ARN: arn:aws:iam::805673386114:role/github-actions-ecr-push-ml-platform-eks
  ECR_REGISTRY: 805673386114.dkr.ecr.us-west-2.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Decide build mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.force }}" == "true" ]]; then
              echo "mode=force" >> "$GITHUB_OUTPUT"
            else
              echo "mode=skip" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "mode=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect image context changes
        id: changes
        if: steps.mode.outputs.mode == 'auto'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            base_gpu:
              - 'projects/components/images/base-gpu/**'
            ray_worker:
              - 'projects/ray/images/**'
              - 'projects/components/images/base-gpu/**'
            training_llm:
              - 'projects/components/images/training-llm/**'
              - 'projects/ray/images/**'
              - 'projects/components/images/base-gpu/**'
            notebook_cpu:
              - 'projects/jupyter/images/**'
              - 'projects/components/sdk/**'
            gpu_idle_monitor:
              - 'projects/jupyter/gpu-idle-monitor/**'
            spark_base:
              - 'projects/spark/images/**'
            text2sql_serve:
              - 'projects/workflows/text2sql/serve/**'

      - name: No image changes
        if: steps.mode.outputs.mode == 'skip' || (steps.mode.outputs.mode == 'auto' && steps.changes.outputs.changes == '[]')
        run: echo "No relevant Docker context changes (or manual run without force); skipping."

      - name: Configure AWS credentials (OIDC)
        if: steps.mode.outputs.mode == 'force' || (steps.mode.outputs.mode == 'auto' && steps.changes.outputs.changes != '[]')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.mode.outputs.mode == 'force' || (steps.mode.outputs.mode == 'auto' && steps.changes.outputs.changes != '[]')
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.mode.outputs.mode == 'force' || (steps.mode.outputs.mode == 'auto' && steps.changes.outputs.changes != '[]')
        uses: docker/setup-buildx-action@v3

      # Build order matters for images that use other images as a base.
      - name: Build and push base-gpu
        if: steps.mode.outputs.mode == 'force' || steps.changes.outputs.base_gpu == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/components/images/base-gpu/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ml-platform/base-gpu:latest
            ${{ env.ECR_REGISTRY }}/ml-platform/base-gpu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ray-worker
        if: steps.mode.outputs.mode == 'force' || steps.changes.outputs.ray_worker == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/ray/images/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.ECR_REGISTRY }}/ml-platform/base-gpu:latest
          tags: |
            ${{ env.ECR_REGISTRY }}/ml-platform/ray-worker:latest
            ${{ env.ECR_REGISTRY }}/ml-platform/ray-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push training-llm
        if: steps.mode.outputs.mode == 'force' || steps.changes.outputs.training_llm == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/components/images/training-llm/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.ECR_REGISTRY }}/ml-platform/ray-worker:latest
          tags: |
            ${{ env.ECR_REGISTRY }}/ml-platform/training-llm:latest
            ${{ env.ECR_REGISTRY }}/ml-platform/training-llm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push notebook-cpu
        if: steps.mode.outputs.mode == 'force' || steps.changes.outputs.notebook_cpu == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/jupyter/images/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ml-platform/notebook-cpu:latest
            ${{ env.ECR_REGISTRY }}/ml-platform/notebook-cpu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gpu-idle-monitor
        if: steps.mode.outputs.mode == 'force' || steps.changes.outputs.gpu_idle_monitor == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/jupyter/gpu-idle-monitor/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ml-platform/gpu-idle-monitor:latest
            ${{ env.ECR_REGISTRY }}/ml-platform/gpu-idle-monitor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push spark-base
        if: steps.mode.outputs.mode == 'force' || steps.changes.outputs.spark_base == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/spark/images/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ml-platform/spark-base:latest
            ${{ env.ECR_REGISTRY }}/ml-platform/spark-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push text2sql-serve
        if: steps.mode.outputs.mode == 'force' || steps.changes.outputs.text2sql_serve == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/workflows/text2sql/serve/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ml-platform/text2sql-serve:latest
            ${{ env.ECR_REGISTRY }}/ml-platform/text2sql-serve:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
